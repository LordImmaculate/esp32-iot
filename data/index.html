<!DOCTYPE html>
<html>

<body onload="getColor()">
    <h3>RGB LED Control</h3>
    <input type="color" id="colorPicker" value="#000000">
    <button onclick="sendColor()">Send to ESP32</button>

    <script>
        function rgbToHex(color) {
            return color.toString(16).padStart(2, '0');
        }

        function sendColor() {
            const hex = document.getElementById('colorPicker').value;

            // Convert Hex (#RRGGBB) to RGB
            const r = parseInt(hex.substring(1, 3), 16);
            const g = parseInt(hex.substring(3, 5), 16);
            const b = parseInt(hex.substring(5, 7), 16);

            // Send as a POST request
            const formData = new FormData();
            formData.append('r', r);
            formData.append('g', g);
            formData.append('b', b);

            fetch('/setcolor', { method: 'POST', body: formData })
                .then(response => response.text())
                .then(data => alert(data));
        }

        function getColor() {
            fetch('/getcolor')
                .then(response => response.json())
                .then(data => {
                    // Convert RGB back to Hex #RRGGBB
                    const hexColor = "#" + rgbToHex(data.r) +
                        rgbToHex(data.g) +
                        rgbToHex(data.b);
                    document.getElementById('colorPicker').value = hexColor;
                });
        }
    </script>
</body>

</html>
