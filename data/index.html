<!DOCTYPE html>
<html>

<body onload="getColor()">
    <h3>RGB LED Control</h3>
    <span>LED Status:</span>
    <span id="ledStatus">Loading...</span>
    <br><br>
    <button onclick="sendColor('ON')">Turn On</button>
    <button onclick="sendColor('OFF')">Turn Off</button>

    <script>
        function sendColor(status) {
            // Send as a POST request
            const formData = new FormData();
            formData.append('status', status);

            fetch('/set', { method: 'POST', body: formData })
                .then(response => {
                    if (!response.ok)
                        alert("Error setting LED");

                    return response.json();
                })
                .then(data => { document.getElementById('ledStatus').textContent = data.status; alert(data.message); });
        }

        function getColor() {
            fetch('/get')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('ledStatus').textContent = data.status ? "ON" : "OFF";
                });
        }
    </script>
</body>

</html>
